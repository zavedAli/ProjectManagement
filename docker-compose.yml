version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pmuser
      POSTGRES_PASSWORD: pmpass
      POSTGRES_DB: project_management
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
